<html>
    <body>
        <style>
            input[type=Email], input[type=password],input[type=name],input[type=Date],input[type="text"],
            input[type=number],input[type=submit]
           
            {
                margin:3px;
                height:30px;
                width:200px;
            }
        #message{ 
            display:none
            background: #f1f1f1;
            color: #000;
            position: relative;
            padding: 20px;
            margin-top:10px;


        }
        #message p{
            padding: 10px 35px;
            font-size: 18px;
        }

            
        </style>
        <title>Registartion Form</title>

        <center>
            <h1 style="margin-bottom: 0px;">
	
             Create an Account 
             </h1>
            </center>
    </body>
    <center>
        <form style="width :500px";
        <label for="Email Id"> <b>Email Id</b></label>
        <br>
        <input type="Email" placeholder="Enter  Email Id" name="Email Id" required>
        <br>
        <label for="Password"> <b>Password</b></label>
        <br>

         <input type="password" placeholder="Password" name="Password" pattern="(?=.\d) (?=.*[a-z]) (?=.*[A-Z] .{8}"
         title="Must contain at least one number and uppercase and lowercase letter, 
         and at least 8 or more characters" required >
         <div id="message">
         <h3>Password must contain the following:</h3>
         
         <p id="letter" class="invalid">A<b>lowercase</b>letter</p>
         <p id="capital" class="invalid">A<b>capital (uppercase)</b>letter</p>
         <p id="number" class="invalid">A<b>number</b>letter</p>
         <p id="length" class="invalid">Minimum<b>8character</b></p>
         </div>
         
       
       
         <br>
         <label for="Name"> <b>Name</b></label>
         <br>
        <input type="text" placeholder="Name" name="Name" required>
        <br>
        <label for="DOB"> <b>DOB</b></label>
        <br>
        <input type="date" placeholder="DOB" name="DOB" required>
        <br>
        <label for="Mobile No."> <b>Mobile No.</b></lable>
            <br>
            <input type="number" placeholder="Mobile No." name="Mobile No." require>
            <br>
            <label for="Gender"> <b>Gender </b></label>
            <br>
            
            <input type="radio" id="Male" name="Gender" value="Male">
            <label for="Male">Male</label>
            
            <input type="radio" id="Female" name="Gender" value="Female">
            <label for="Female">Female</label>
            <br>
            <br>
            
        <label for="Select Your Course"><b>Select Your Course</b></label>
        
        <select id="Courses">
            
            <option>BTECH</option>
            <option>BBA</option>
            <option>BCA</option>
            <option>B.COM</option>
            <option>MBA</option>
            <option>MTECH</option>
            <option>MCA</option>
        </select>
        <br>
        <br>
    
        <label for="Colleges"><b>Colleges</b></label>
        
        <select id="College">
            <option>RGPV Bhopal</option>
            <option>Mahakal institute of technology</option>
            <option>Ujjain Engineering College</option>
            <option>Acropolis Institute of Technology</option>
            <option>AISECT College</option>
            <option>DAVV College</option>
            <option>SAGE University</option>
        </select>
        <br>
        <br>
        <label for="Address"> <b>Address</b></label>
        <br>
        <input type="text" placeholder="Address" name="Address" required>
        <br>
        <label type="Country"><b>Country</b></label>
        <br>
        <input type="text" placeholder="Country" name="Country" required>
        <br>
        <label type="ZIP Code"><b>ZIP Code</b></label>
        <br>
        <input type="text" placeholder="ZIP Code" name="ZIP Code" required>
        <br>
<input  style= background-color:dodgerblue;font-weight:800; type="submit" >

    </center>
</html>
